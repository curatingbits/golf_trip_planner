<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a472a"/>
      <stop offset="100%" stop-color="#2d6a4f"/>
    </linearGradient>
    <linearGradient id="trophyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#daa520"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff8dc"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#ffd700" stroke-width="4" opacity="0.4"/>
  <circle cx="256" cy="256" r="228" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.25"/>

  <!-- Trophy cup body -->
  <path d="M176 140 h160 c0 0, 8 0, 8 8 l-16 120 c-4 32 -28 56 -60 62 l0 0 h-24 l0 0 c-32-6 -56-30 -60-62 L168 148 c0-8 8-8 8-8z"
        fill="url(#trophyGrad)" stroke="#b8860b" stroke-width="2"/>

  <!-- Trophy rim highlight -->
  <rect x="174" y="136" width="164" height="14" rx="7" fill="url(#rimGrad)" stroke="#daa520" stroke-width="1"/>

  <!-- Cup inner shine -->
  <path d="M200 154 h20 l-10 80z" fill="white" opacity="0.15"/>
  <path d="M192 154 h8 l-6 60z" fill="white" opacity="0.1"/>

  <!-- Left handle -->
  <path d="M176 170 c-40 0 -56 16 -56 48 c0 32 20 48 56 48"
        fill="none" stroke="url(#trophyGrad)" stroke-width="18" stroke-linecap="round"/>
  <path d="M176 170 c-40 0 -56 16 -56 48 c0 32 20 48 56 48"
        fill="none" stroke="#fff8dc" stroke-width="4" stroke-linecap="round" opacity="0.2"/>

  <!-- Right handle -->
  <path d="M336 170 c40 0 56 16 56 48 c0 32 -20 48 -56 48"
        fill="none" stroke="url(#trophyGrad)" stroke-width="18" stroke-linecap="round"/>
  <path d="M336 170 c40 0 56 16 56 48 c0 32 -20 48 -56 48"
        fill="none" stroke="#fff8dc" stroke-width="4" stroke-linecap="round" opacity="0.2"/>

  <!-- Trophy stem -->
  <rect x="240" y="330" width="32" height="50" rx="4" fill="url(#trophyGrad)" stroke="#b8860b" stroke-width="1.5"/>

  <!-- Trophy base -->
  <rect x="196" y="376" width="120" height="16" rx="4" fill="url(#trophyGrad)" stroke="#b8860b" stroke-width="1.5"/>
  <rect x="206" y="388" width="100" height="12" rx="3" fill="#b8860b" stroke="#8b6914" stroke-width="1"/>

  <!-- Base shine -->
  <rect x="200" y="377" width="116" height="5" rx="2.5" fill="#fff8dc" opacity="0.2"/>

  <!-- Golf ball on trophy -->
  <circle cx="256" cy="222" r="36" fill="#f5f5f0" stroke="#ccc" stroke-width="1.5"/>
  <!-- Golf ball dimples -->
  <circle cx="244" cy="210" r="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <circle cx="256" cy="206" r="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <circle cx="268" cy="210" r="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <circle cx="238" cy="222" r="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <circle cx="250" cy="220" r="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <circle cx="262" cy="220" r="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <circle cx="274" cy="222" r="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <circle cx="244" cy="234" r="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <circle cx="256" cy="234" r="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <circle cx="268" cy="234" r="4" fill="none" stroke="#ddd" stroke-width="1"/>

  <!-- Star accent on cup above ball -->
  <polygon points="256,164 260,176 272,176 262,184 266,196 256,188 246,196 250,184 240,176 252,176"
           fill="#fff8dc" opacity="0.6"/>

  <!-- Text banner area -->
  <text x="256" y="440" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#ffd700" letter-spacing="4">OKIE CUP</text>
</svg>
